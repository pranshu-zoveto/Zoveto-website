name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (clean lockfile)
        run: npm ci

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_PUBLIC_COS_API_URL: https://api.example.com/api
          NEXT_PUBLIC_COS_APP_URL: https://app.example.com
          COS_API_BASE_URL: https://api.example.com/api
          # Optional: add repo secrets SENTRY_ORG, SENTRY_PROJECT, SENTRY_AUTH_TOKEN for upload + CI builds.
