# Local marketing site with bind mount + HMR (no image rebuild for UI edits).
# From this directory: npm run dev:docker
# Host: http://localhost:3002
#
# First run: anonymous volume `website_node_modules` is empty — wait for `npm install`
# in the startup command, or run `docker compose run --rm website npm install` once.
services:
  website:
    image: node:20-bookworm-slim
    working_dir: /app
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: "0.0.0.0"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_DEV_POLL: "1"
    volumes:
      - .:/app
      - website_node_modules:/app/node_modules
    command: >
      sh -c "npm install && node ./node_modules/next/dist/bin/next dev -p 3002 -H 0.0.0.0"
    stdin_open: true
    tty: true

volumes:
  website_node_modules:
